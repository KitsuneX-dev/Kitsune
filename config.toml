# ════════════════════════════════════════════════════════════════
#  Kitsune Userbot — config.toml
#  Developer: Yushi (@Mikasu32)
#
#  Получи api_id и api_hash на https://my.telegram.org
# ════════════════════════════════════════════════════════════════

# ── Обязательные ─────────────────────────────────────────────────
api_id   = 0              # твой API ID (число)
api_hash = ""             # твой API Hash (строка)

# ── Основные настройки ────────────────────────────────────────────
prefix   = "."            # префикс команд (1–3 символа)
lang     = "ru"           # язык интерфейса: ru / en / de

# ── Inline бот (опционально) ──────────────────────────────────────
# bot_token = "123456:ABC..."   # токен бота от @BotFather
#                               # если не задан — авто-получение

# ── Web интерфейс ─────────────────────────────────────────────────
web_host = "0.0.0.0"      # хост веб-интерфейса
web_port = 8080           # порт веб-интерфейса

# ── Redis (опционально, для Railway/VPS) ─────────────────────────
# redis_uri = "redis://localhost:6379/0"

# ── Прокси (опционально) ─────────────────────────────────────────
# Нужен если GitHub или Telegram недоступны напрямую (РФ, блокировки).
# Прокси применяется к: боту aiogram, git fetch/ls-remote, Telethon.
#
# Типы: SOCKS5 (рекомендуется), SOCKS4, HTTP
#
# [proxy]
# type     = "SOCKS5"
# host     = "127.0.0.1"
# port     = 1080
# username = ""           # опционально
# password = ""           # опционально
